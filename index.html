<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank you</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    /* Fix: Apply background color to html to prevent white 'rubber-banding' gaps */
    html {
      background-color: black; 
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Prevents accidental scrolling on a simple thank you page */
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;

      /* Fix: Attachment fixed helps Safari maintain cover during UI shifts */
      background: url("background.gif") no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      background-color: black;

      /* Use the Dynamic Viewport Height for mobile */
      min-height: 100dvh;
      width: 100%;

      /* Safe area padding so content doesn't hit the notch */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      
      /* Essential: ensures padding doesn't push the height beyond 100dvh */
      box-sizing: border-box;
    }

    h1 {
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 25px 35px;
      border-radius: 16px;
      text-align: center;
      font-size: clamp(1.2rem, 6vw, 2rem);
      margin: 20px;
      backdrop-filter: blur(5px); /* Adds a nice modern touch if the gif is busy */
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 80%;
    }
  </style>
</head>
<body>
  <h1>Thank you.<br>You can close the tab.</h1>
</body>
</html>
